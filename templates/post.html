<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | 루미번역행정사사무소</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="canonical" href="{{SITE_URL}}/blog/{{SLUG}}.html">
<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{SITE_URL}}/blog/{{SLUG}}.html">
<meta property="article:published_time" content="{{DATE_ISO}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{TITLE_JSON}},
  "description": {{DESCRIPTION_JSON}},
  "datePublished": "{{DATE_ISO}}",
  "inLanguage": "ko",
  "author": { "@type": "Organization", "name": "루미번역행정사사무소", "@id": "{{SITE_URL}}/#business" },
  "publisher": { "@type": "Organization", "name": "루미번역행정사사무소", "@id": "{{SITE_URL}}/#business" },
  "mainEntityOfPage": "{{SITE_URL}}/blog/{{SLUG}}.html"
}
</script>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="/"><span class="seal">Lumi</span>루미번역행정사사무소</a>
    <button class="nav-toggle" aria-label="메뉴 열기" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
    <nav class="main-nav" aria-label="주 메뉴">
      <a href="/">홈</a>
      <a href="/services/">서비스</a>
      <a href="/blog/" class="active">번역·행정 가이드</a>
      <a href="/contact.html">오시는 길·문의</a>
    </nav>
  </div>
</header>

<main>
<section class="post-header">
  <div class="container">
    <span class="post-date">{{DATE_DISPLAY}}{{CATEGORY_SUFFIX}}</span>
    <h1>{{TITLE}}</h1>
  </div>
</section>

<article class="post-body">
{{CONTENT}}
</article>

<div class="post-source">
  <div class="box">이 글은 <a href="{{ORIGINAL_URL}}" rel="noopener">네이버 블로그</a>에 게재된 원문을 자동 동기화한 것입니다. · 문의: <a href="/contact.html">오시는 길·문의</a></div>
</div>

<section class="cta-band">
  <div class="container">
    <h2>이 서류, 직접 처리해 드립니다</h2>
    <p>번역공증·아포스티유·행정 절차 — 서류 사진 한 장으로 견적을 받아보세요.</p>
    <a class="btn btn-gold" href="/contact.html">문의하기</a>
  </div>
</section>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">© 2026 루미번역행정사사무소 · <a href="/">홈</a> · <a href="/services/">서비스</a> · <a href="/blog/">가이드</a> · <a href="/contact.html">문의</a></div>
  </div>
</footer>
</body>
</html>
